name: Daily AI Fetch

on:
    schedule:
      - cron: '37 20 * * *'
    workflow_dispatch:
permissions:
    contents: write

jobs:
    fetch:
      runs-on: ubuntu-latest
      timeout-minutes: 30

      steps:
        - uses: actions/checkout@v4

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        - name: Install dependencies
          run: pip install -r requirements.txt

        - name: Fetch and Process
          env:
            DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          run: python crawler/fetch_all.py

        - name: Trigger Vercel rebuild
          run: echo "// $(date -Iseconds)" > web/src/build-trigger.ts

        - name: Commit and Push
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add web/public/data/daily.json web/src/build-trigger.ts
            git diff --staged --quiet || git commit -m "data: daily update $(date +%Y-%m-%d)"
            git push
        - name: Trigger Vercel Deploy
          run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }}
